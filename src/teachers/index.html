<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8">
		<title>B.A.M.B.I. v.0.1</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<script src="/page/script.js"></script>
		<link rel="stylesheet" href="page/styles.css">
    </head>
    <body onload="load()">
		<main id="list">
			<table id="table">
				<tr>
					<th>Vorname</th>
					<th>Nachname</th>
					<th>E-Mail</th>
					<th>Level</th>
				</tr>
			</table>
		</main>
		<div id="popup" class="hidden">
			<button id="close" onclick="closePopup()">Schließen</button>
			<div class="row">
				<p id="identification" class="lable">Id: </p>
			</div>
			<div class="row">
				<p class="lable">Vorname: </p>
				<input id="firstName">
				<p class="lable">Nachname: </p>
				<input id="lastName">
			</div>
			<div class="row">
				<p class="lable">E-Mail: </p>
				<input id="mail" type="email">
			</div>
			<div class="row">
				<label for="level">Level: </label>
				<select id="level">
					<option value="NORMAL">NORMAL</option>
					<option value="ADMIN">ADMIN</option>
				</select>
			</div>
			<div class="row">
				<p class="lable">Geschlecht: </p>
				<select id="gender"></select>
			</div>
			<div class="row">
				<p class="lable">Geburtstag: </p>
				<input id="birthday" type="date">
			</div>
			<div class="row">
				<p class="lable">Adresse: </p>
				<div id="address-block">
					<input id="addr-nr" type="number" placeholder="Hausnr.">
					<input id="addr-street" placeholder="Straße">
					<input id="addr-city" placeholder="Stadt">
					<input id="addr-zip" type="number" placeholder="PLZ">
					<input id="addr-country" placeholder="Land">
				</div>
			</div>
			<div class="row">
				<p class="lable">Chipkarte: </p>
				<span id="rfid-display"></span>
				<button type="button" id="rfid-scan-btn" onclick="startRfidScan(this)">Karte scannen</button>
				<span id="rfid-scan-status"></span>
			</div>
			<div class="row">
				<p class="lable">Neues Passwort: </p>
				<input id="newPassword" type="password" placeholder="leer lassen = unverändert">
			</div>
			<input type="hidden" id="passwordHash">
			<div class="row">
				<button id="save">Speichern</button>
				<button id="delete">Löschen</button>
			</div>
			<p id="message"></p>
		</div>
    </body>
</html>
