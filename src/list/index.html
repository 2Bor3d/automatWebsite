<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>B.A.M.B.I. v.0.1</title>
    <meta name="viewport" contetn="width=device-width, initial-scale=1.0">
    <script src="/page/script.js"></script>
    <link rel="stylesheet" href="page/styles.css">
</head>
<body onload="load()">
<div id="searchbar">
    <input id="search" placeholder="suchen..."/>
    <button id="searchbutton" onclick="search()">suchen</button>
</div>
<main id="list">
    <table id="table">
        <tr>
            <th>Vorname</th>
            <th>Nachname</th>
            <th>Anwesenheit</th>
            <th>Zeitkonto</th>
            <th>Letzte 7 Tage</th>
        </tr>
    </table>
</main>
<div id="popup" class="hidden">
    <button id="close" onclick="closePopup()">Schließen</button>
    <div class="row">
        <p id="identification" class="lable">Id: </p>
        <div class="row">
            <p class="lable">Vorname: </p>
            <input id="firstName" disabled>
            <p class="lable">Nachname: </p>
            <input id="lastName" disabled>

        </div>
        <div class="row">
            <p class="lable">Anwesenheit: </p>
            <input id="attendanceDate" type="date">
            <select id="attendance">
                <option value="present">Anwesend</option>
                <option value="excused">Entschuldigt</option>
                <option value="absent">Abwesend</option>
            </select>
        </div>
        <div class="row">
            <p class="lable">Zeitkonto: </p>
            <input id="balance" type="number">
        </div>
        <div class="row admin-field" style="display:none">
            <p class="lable">Kurse: </p>
            <div id="kurs-select">
                <input id="kurs-search" type="text" placeholder="Suchen…" autocomplete="off">
                <div id="kurs-options"></div>
            </div>
        </div>
        <div class="row admin-field" style="display:none">
            <p class="lable">Geschlecht: </p>
            <select id="gender"></select>
        </div>
        <div class="row admin-field" style="display:none">
            <p class="lable">Geburtstag: </p>
            <input id="birthday" type="date">
        </div>
        <div class="row admin-field" style="display:none">
            <p class="lable">Adresse: </p>
            <div id="address-block">
                <input id="addr-nr" type="number" placeholder="Hausnr.">
                <input id="addr-street" placeholder="Straße">
                <input id="addr-city" placeholder="Stadt">
                <input id="addr-zip" type="number" placeholder="PLZ">
                <input id="addr-country" placeholder="Land">
            </div>
        </div>
        <div class="row admin-field" style="display:none">
            <p class="lable">Chipkarte: </p>
            <span id="rfid-display"></span>
            <button type="button" id="rfid-scan-btn" onclick="startRfidScan(this)">Karte scannen</button>
            <span id="rfid-scan-status"></span>
        </div>
        <div class="row">
            <button id="save">Speichern</button>
            <button id="delete" disabled>Löschen</button>
        </div>
    </div>
</div>
</body>
</html>
